<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soll Denise mit? 🗳️</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #0d0d12;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 1rem; position: relative; overflow: hidden;
  }
  body::before {
    content: ''; position: fixed; top: -30%; left: -20%; width: 70%; height: 70%;
    background: radial-gradient(circle, rgba(138,43,226,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: ''; position: fixed; bottom: -20%; right: -10%; width: 60%; height: 60%;
    background: radial-gradient(circle, rgba(0,200,150,0.1) 0%, transparent 70%);
    pointer-events: none;
  }
  .card {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 28px; padding: 1.5rem 1.5rem; max-width: 420px; width: 100%;
    backdrop-filter: blur(12px);
  }
  .badge {
    display: inline-block; font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
    text-transform: uppercase; color: rgba(255,255,255,0.4);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 20px;
    padding: 4px 12px; margin-bottom: 0.8rem;
  }
  h1 {
    font-family: 'Syne', sans-serif; font-size: clamp(1.8rem,6vw,2.4rem);
    font-weight: 800; color: #fff; line-height: 1.15; margin-bottom: 0.3rem;
  }
  .subtitle { font-size: 14px; color: rgba(255,255,255,0.4); margin-bottom: 1.2rem; }
  .profile-section {
    display: none; flex-direction: column; align-items: center;
    margin-bottom: 1rem; opacity: 0;
    transition: opacity 0.5s ease, transform 0.5s ease;
    transform: translateY(10px);
  }
  .profile-section.visible { display: flex; }
  .profile-section.shown { opacity: 1; transform: translateY(0); }
  .profile-img {
    width: 70px; height: 70px; border-radius: 50%; object-fit: cover;
    border: 3px solid rgba(255,255,255,0.25); margin-bottom: 0.3rem;
  }
  .profile-name { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; color: #fff; }
  .options { display: flex; flex-direction: column; gap: 12px; margin-bottom: 1.2rem; }
  .option-btn {
    position: relative; display: flex; align-items: center; gap: 14px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 0.8rem 1rem; cursor: pointer;
    transition: all 0.2s ease; color: #fff; font-family: 'DM Sans', sans-serif;
    font-size: 16px; font-weight: 500; text-align: left; overflow: hidden; width: 100%;
  }
  .option-btn:hover:not(:disabled) { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.2); transform: translateY(-1px); }
  .option-btn:disabled { cursor: default; }
  .option-btn .emoji { font-size: 22px; line-height: 1; flex-shrink: 0; width: 32px; text-align: center; }
  .option-btn .label { flex: 1; }
  .option-btn .count { font-size: 13px; color: rgba(255,255,255,0.45); font-weight: 400; min-width: 55px; text-align: right; }
  .option-btn .bar {
    position: absolute; left: 0; top: 0; bottom: 0; border-radius: 16px;
    transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1); pointer-events: none; opacity: 0;
  }
  .option-btn[data-key="ja"] .bar   { background: linear-gradient(90deg, rgba(0,220,140,0.18), transparent); }
  .option-btn[data-key="egal"] .bar { background: linear-gradient(90deg, rgba(138,43,226,0.18), transparent); }
  .option-btn[data-key="nein"] .bar { background: linear-gradient(90deg, rgba(255,80,80,0.18), transparent); }
  .option-btn.selected[data-key="ja"]   { border-color: rgba(0,220,140,0.5); background: rgba(0,220,140,0.1); }
  .option-btn.selected[data-key="egal"] { border-color: rgba(138,43,226,0.5); background: rgba(138,43,226,0.1); }
  .option-btn.selected[data-key="nein"] { border-color: rgba(255,80,80,0.5); background: rgba(255,80,80,0.1); }
  .pct { font-size: 13px; font-weight: 500; min-width: 36px; text-align: right; display: none; }
  .option-btn[data-key="ja"] .pct   { color: rgba(0,220,140,0.85); }
  .option-btn[data-key="egal"] .pct { color: rgba(160,100,255,0.85); }
  .option-btn[data-key="nein"] .pct { color: rgba(255,100,100,0.85); }
  .footer-info { display: flex; align-items: center; gap: 8px; font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 0.5rem; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(0,220,140,0.6); animation: pulse 2s infinite; flex-shrink: 0; }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.7); } }
  .thanks { text-align: center; padding: 1rem 0 0.5rem; font-size: 13px; color: rgba(255,255,255,0.4); display: none; }
  @keyframes flash67anim {
    0%   { opacity: 0; transform: scale(0.4); }
    25%  { opacity: 1; transform: scale(1.05); }
    65%  { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.5); }
  }
</style>
</head>

  function getData() {
    try { const d = localStorage.getItem(STORAGE_KEY); return d ? JSON.parse(d) : {ja:0,egal:0,nein:0}; }
    catch(e) { return {ja:0,egal:0,nein:0}; }
  }
  function saveData(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch(e) {} }
  function hasVoted() { return !!localStorage.getItem('denise_voted_v3'); }
  function markVoted(k) { localStorage.setItem('denise_voted_v3', k); }

  function render(data, voted) {
    const total = data.ja + data.egal + data.nein;
    ['ja','egal','nein'].forEach(k => {
      const pct = total > 0 ? Math.round((data[k]/total)*100) : 0;
      const btn = document.querySelector('[data-key="'+k+'"]');
      const bar = document.getElementById('bar-'+k);
      const pctEl = document.getElementById('pct-'+k);
      const countEl = document.getElementById('count-'+k);
      if (voted) {
        bar.style.opacity = '1'; bar.style.width = pct+'%';
        pctEl.style.display = 'block'; pctEl.textContent = pct+'%';
        countEl.textContent = data[k]+(data[k]===1?' Stimme':' Stimmen');
        btn.disabled = true;
        if (localStorage.getItem('denise_voted_v3') === k) btn.classList.add('selected');
      } else {
        bar.style.width = '0%'; countEl.textContent = '';
      }
    });
    if (voted) {
      document.getElementById('thanks').style.display = 'block';
      const ps = document.getElementById('profileSection');
      ps.classList.add('visible');
      setTimeout(() => ps.classList.add('shown'), 50);
      document.getElementById('footerText').textContent = total+(total===1?' Stimme bisher':' Stimmen bisher');
    } else {
      document.getElementById('footerText').textContent = 'Noch nicht abgestimmt';
    }
  }

  function showFlash(cb) {
    const el = document.createElement('div');
    el.style.cssText = 'position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:999;animation:flash67anim 1.5s cubic-bezier(0.22,1,0.36,1) forwards;gap:1.2rem;';
    el.innerHTML = '<img src="'+IMG_SRC+'" style="width:150px;height:150px;object-fit:cover;border-radius:50%;border:4px solid #fff;box-shadow:0 0 50px rgba(255,255,255,0.3);">'
      + '<span style="font-family:Syne,sans-serif;font-size:clamp(5rem,28vw,10rem);font-weight:800;color:#fff;line-height:1;">67</span>';
    document.body.appendChild(el);
    setTimeout(() => { el.remove(); cb(); }, 1500);
  }

  function vote(key) {
    if (hasVoted()) return;
    const data = getData();
    data[key]++;
    saveData(data);
    markVoted(key);
    showFlash(() => render(data, true));
  }

  render(getData(), hasVoted());
</script>
</body>
</html>
